<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLearn - O Teu Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style> * { transition: all 0.3s ease; } </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans antialiased min-h-screen">

    <nav class="bg-white dark:bg-gray-800 shadow-sm py-4 px-8 flex justify-between items-center sticky top-0 z-50 border-b border-transparent dark:border-gray-700">
        <div class="flex items-center gap-3">
            <a href="dashboard.html" class="bg-blue-600 p-2 rounded-lg text-white shadow-lg shadow-blue-500/20">
                <i class="fas fa-shield-alt text-xl"></i>
            </a>
            <h1 class="font-bold text-lg leading-tight">CyberLearn</h1>
        </div>
        <a href="dashboard.html" class="text-cyan-500 hover:text-cyan-400 font-bold text-sm flex items-center gap-2 transition-all">
            <i class="fas fa-arrow-left"></i> Voltar ao Dashboard
        </a>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="bg-white dark:bg-gray-800 p-10 rounded-[3rem] border border-gray-100 dark:border-gray-700 shadow-sm mb-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-r from-blue-600 to-cyan-500 opacity-10"></div>
            
            <div class="relative z-10">
                <div class="w-32 h-32 bg-gray-200 dark:bg-gray-700 rounded-full mx-auto mb-6 border-4 border-white dark:border-gray-800 shadow-xl flex items-center justify-center overflow-hidden">
                    <i class="fas fa-user text-5xl text-gray-400"></i>
                </div>
                <h2 id="user-name" class="text-3xl font-black mb-2 text-gray-900 dark:text-white">Carregando Nome...</h2>
                <p id="user-role" class="text-blue-600 dark:text-blue-400 font-bold uppercase tracking-widest text-xs">Nível 1 • Aprendiz Cyber</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <section class="bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] border border-gray-100 dark:border-gray-700 shadow-sm">
                <h3 class="font-bold text-xl mb-8 flex items-center gap-3">
                    <i class="fas fa-chart-pie text-blue-600"></i> As Tuas Estatísticas
                </h3>
                <div class="space-y-6">
                    <div class="flex justify-between items-center p-4 bg-gray-50 dark:bg-gray-900/50 rounded-2xl">
                        <span class="text-gray-500 dark:text-gray-400 font-medium">Pontos Totais</span>
                        <span id="total-points" class="text-2xl font-black text-blue-600">0</span>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-gray-50 dark:bg-gray-900/50 rounded-2xl">
                        <span class="text-gray-500 dark:text-gray-400 font-medium">Módulos Lidos</span>
                        <span class="text-2xl font-black text-purple-600">0/4</span>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-gray-50 dark:bg-gray-900/50 rounded-2xl">
                        <span class="text-gray-500 dark:text-gray-400 font-medium">Rank na Turma</span>
                        <span class="text-2xl font-black text-yellow-500">#--</span>
                    </div>
                </div>
            </section>

            <section class="bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] border border-gray-100 dark:border-gray-700 shadow-sm">
                <h3 class="font-bold text-xl mb-8 flex items-center gap-3">
                    <i class="fas fa-award text-blue-600"></i> Conquistas
                </h3>
                <div class="grid grid-cols-3 gap-4" id="badges-container">
                    <div class="flex flex-col items-center gap-2 opacity-20 grayscale">
                        <div class="w-16 h-16 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center border-2 border-dashed border-gray-400">
                            <i class="fas fa-shield-virus text-2xl"></i>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-tight">Defensor</span>
                    </div>
                    <div class="flex flex-col items-center gap-2 opacity-20 grayscale">
                        <div class="w-16 h-16 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center border-2 border-dashed border-gray-400">
                            <i class="fas fa-brain text-2xl"></i>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-tight">Estrategista</span>
                    </div>
                    <div class="flex flex-col items-center gap-2 opacity-20 grayscale">
                        <div class="w-16 h-16 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center border-2 border-dashed border-gray-400">
                            <i class="fas fa-bolt text-2xl"></i>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-tight">Rápido</span>
                    </div>
                </div>
                <p class="text-center text-xs text-gray-400 mt-8 italic">Completa mais quizzes para desbloquear!</p>
            </section>
        </div>
    </main>

    <script>
        window.onload = function() {
            // Recuperar dados
            const nome = localStorage.getItem('userName') || "Explorador Cyber";
            const pontos = parseInt(localStorage.getItem('userPoints')) || 0;
            const perfil = localStorage.getItem('userPerfil') || "ALUNO";

            // Aplicar na interface
            document.getElementById('user-name').innerText = nome;
            document.getElementById('total-points').innerText = pontos;
            document.getElementById('user-role').innerText = `Nível 1 • ${perfil}`;

            // Lógica simples de conquistas baseada em pontos
            if (pontos >= 30) {
                const badge = document.querySelector('.opacity-20');
                if (badge) {
                    badge.classList.remove('opacity-20', 'grayscale');
                    badge.classList.add('text-blue-600');
                    badge.querySelector('div').classList.remove('border-dashed');
                    badge.querySelector('div').classList.add('bg-blue-50', 'border-solid', 'border-blue-500');
                }
            }
        };
    </script>
</body>
</html>
