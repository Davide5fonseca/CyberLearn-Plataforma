<!DOCTYPE html>
<html lang="pt" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLearn - Aula</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        .prose img { border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .prose iframe { width: 100%; aspect-ratio: 16/9; border-radius: 1rem; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Estilo específico para a exportação PDF */
        .pdf-export { background: white !important; color: black !important; padding: 40px !important; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-200 font-sans antialiased flex flex-col h-full">

    <nav class="h-12 bg-white dark:bg-slate-900 shadow-sm px-6 flex justify-between items-center border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded shadow-lg shadow-blue-500/20"><i class="fas fa-book-open text-white text-sm"></i></div>
            <span id="nav-titulo" class="font-bold text-sm tracking-tight dark:text-white">Carregando aula...</span>
        </div>
        <a href="modulos.html" class="text-xs font-black text-slate-400 hover:text-blue-600 uppercase tracking-widest transition-colors">
            <i class="fas fa-times mr-1"></i> Sair da Aula
        </a>
    </nav>

    <main class="flex-1 overflow-y-auto custom-scroll">
        <article class="max-w-3xl mx-auto py-12 px-6">
            <header class="mb-10">
                <span id="aula-categoria" class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-2 block">CATEGORIA</span>
                <h1 id="aula-titulo" class="text-3xl md:text-4xl font-black dark:text-white leading-tight mb-4">Título da Aula</h1>
                <div class="h-1 w-20 bg-blue-600 rounded-full"></div>
            </header>

            <div id="aula-conteudo" class="prose prose-slate dark:prose-invert max-w-none 
                prose-headings:font-black prose-headings:tracking-tight 
                prose-p:text-base prose-p:leading-relaxed prose-p:text-slate-600 dark:prose-p:text-slate-400">
                <p class="animate-pulse">A preparar o conteúdo da aula...</p>
            </div>

            <footer class="mt-16 pt-8 border-t border-slate-200 dark:border-slate-800 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex gap-3">
                    <button onclick="gerarPDF()" class="border border-slate-200 dark:border-slate-700 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center gap-2 dark:text-white">
                        <i class="fas fa-file-pdf text-red-500"></i> Guardar PDF
                    </button>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="text-xs text-slate-400 font-medium hidden sm:block">Concluíste a leitura?</div>
                    <a href="quiz.html" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-black uppercase tracking-widest rounded-xl shadow-lg shadow-blue-500/20 transition-all">
                        Fazer Desafio <i class="fas fa-brain ml-2"></i>
                    </a>
                </div>
            </footer>
        </article>
    </main>

    <script>
        // Função para carregar o conteúdo da Base de Dados
        async function carregarConteudo() {
            const id = localStorage.getItem('currentModuloId');
            if (!id) { window.location.href = 'modulos.html'; return; }

            try {
                const res = await fetch(`/api/usuarios/modulo/${id}`);
                const modulo = await res.json();

                document.title = `CyberLearn - ${modulo.titulo}`;
                document.getElementById('nav-titulo').innerText = modulo.titulo;
                document.getElementById('aula-titulo').innerText = modulo.titulo;
                document.getElementById('aula-categoria').innerText = modulo.categoria;
                document.getElementById('aula-conteudo').innerHTML = modulo.conteudo;
            } catch (err) {
                console.error(err);
                document.getElementById('aula-conteudo').innerHTML = "<p class='text-red-500 font-bold'>Erro ao carregar o conteúdo. Verifica a ligação ao servidor.</p>";
            }
        }

        // Função para exportar a aula para PDF
        function gerarPDF() {
            const elemento = document.getElementById('aula-conteudo');
            const titulo = document.getElementById('aula-titulo').innerText;
            
            const opcoes = {
                margin: 15,
                filename: `CyberLearn_Aula_${titulo.replace(/ /g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            // Aplica estilo temporário para garantir PDF com fundo branco
            elemento.classList.add('pdf-export');

            html2pdf().set(opcoes).from(elemento).save().then(() => {
                // Remove o estilo temporário após a geração
                elemento.classList.remove('pdf-export');
            });
        }

        // Gestão de Tema
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        window.onload = carregarConteudo;
    </script>
</body>
</html>
