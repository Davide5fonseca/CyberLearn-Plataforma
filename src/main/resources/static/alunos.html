<!DOCTYPE html>
<html lang="pt" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLearn - Listagem de Alunos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        // Segurança: Apenas Professor
        if (localStorage.getItem('userPerfil') !== 'PROFESSOR') window.location.href = "index.html";

        // Inicialização do Tema
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        }

        async function carregarAlunos() {
            try {
                const res = await fetch('/api/usuarios/lista-alunos');
                if (!res.ok) throw new Error("Erro ao buscar alunos");
                
                const alunos = await res.json();
                const tabela = document.getElementById('tabela-corpo');
                tabela.innerHTML = '';

                alunos.forEach(aluno => {
                    tabela.innerHTML += `
                        <tr class="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                            <td class="p-4 text-xs font-bold dark:text-white">${aluno.nome}</td>
                            <td class="p-4 text-xs text-slate-500">${aluno.email}</td>
                            <td class="p-4 text-xs font-black text-blue-600 uppercase">${aluno.perfil}</td>
                            <td class="p-4 text-right">
                                <button onclick="verNotas('${aluno.email}', '${aluno.nome}')" class="p-2 text-slate-400 hover:text-blue-600 transition-colors" title="Ver Notas">
                                    <i class="fas fa-file-invoice"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('total-alunos').innerText = alunos.length;
            } catch (err) {
                console.error(err);
                document.getElementById('tabela-corpo').innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">Erro ao carregar a lista. Verifica o servidor.</td></tr>';
            }
        }

        // FUNÇÃO PARA GERAR PDF PROFISSIONAL (NÃO É PRINT)
        function gerarRelatorioGeral() {
            const total = document.getElementById('total-alunos').innerText;
            const linhas = document.getElementById('tabela-corpo').rows;
            let conteudoTabela = '';

            // Construir as linhas manualmente para o PDF ser limpo
            for (let i = 0; i < linhas.length; i++) {
                conteudoTabela += `
                    <tr>
                        <td style="padding: 8px; border: 1px solid #ddd;">${linhas[i].cells[0].innerText}</td>
                        <td style="padding: 8px; border: 1px solid #ddd;">${linhas[i].cells[1].innerText}</td>
                        <td style="padding: 8px; border: 1px solid #ddd;">${linhas[i].cells[2].innerText}</td>
                    </tr>`;
            }

            const template = document.createElement('div');
            template.innerHTML = `
                <div style="padding: 40px; font-family: sans-serif; color: #333;">
                    <h1 style="color: #2563eb; border-bottom: 2px solid #2563eb; padding-bottom: 10px;">CyberLearn - Relatório de Turma</h1>
                    <p style="font-size: 12px; margin-top: 10px;">Data: ${new Date().toLocaleDateString('pt-PT')}</p>
                    <p style="font-size: 14px;">Total de Alunos Registados: <strong>${total}</strong></p>
                    
                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <thead>
                            <tr style="background-color: #f3f4f6;">
                                <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">Nome</th>
                                <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">E-mail</th>
                                <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">Perfil</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${conteudoTabela}
                        </tbody>
                    </table>
                </div>
            `;

            const opcoes = {
                margin: 0,
                filename: 'CyberLearn_Relatorio_Alunos.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opcoes).from(template).save();
        }

        async function verNotas(email, nome) {
    try {
        const res = await fetch(`/api/usuarios/notas-aluno/${email}`);
        const notas = await res.json();

        if (notas.length === 0) {
            alert(`O aluno ${nome} ainda não concluiu nenhum desafio.`);
            return;
        }

        // Criar o conteúdo do PDF (Documento limpo)
        const docHtml = document.createElement('div');
        docHtml.innerHTML = `
            <div style="font-family: Arial; padding: 40px; color: #333;">
                <h1 style="color: #2563eb; border-bottom: 2px solid #2563eb;">CyberLearn - Relatório Individual</h1>
                <p><strong>Aluno:</strong> ${nome}</p>
                <p><strong>Email:</strong> ${email}</p>
                <p><strong>Data de Emissão:</strong> ${new Date().toLocaleDateString()}</p>
                
                <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                    <thead>
                        <tr style="background-color: #f3f4f6; text-align: left;">
                            <th style="padding: 10px; border: 1px solid #ddd;">Categoria</th>
                            <th style="padding: 10px; border: 1px solid #ddd;">Resultado</th>
                            <th style="padding: 10px; border: 1px solid #ddd;">Pontos XP</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${notas.map(n => `
                            <tr>
                                <td style="padding: 10px; border: 1px solid #ddd;">${n.categoria}</td>
                                <td style="padding: 10px; border: 1px solid #ddd;">${n.nota} / 6</td>
                                <td style="padding: 10px; border: 1px solid #ddd;">+${n.xpGanhos} XP</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                <div style="margin-top: 40px; font-size: 10px; color: #666; text-align: center;">
                    Documento gerado automaticamente pela plataforma CyberLearn.
                </div>
            </div>
        `;

        const opcoes = {
            margin: 10,
            filename: `Relatorio_${nome.replace(/ /g, '_')}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opcoes).from(docHtml).save();

    } catch (err) {
        alert("Erro ao gerar relatório. Verifica a ligação ao servidor.");
    }
}
        window.onload = carregarAlunos;
    </script>

    <style>
        * { transition: background-color 0.2s ease, color 0.2s ease; }
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-200 font-sans antialiased flex flex-col h-full">
    
    <nav class="h-12 bg-white dark:bg-slate-900 shadow-sm px-6 flex justify-between items-center border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded shadow-lg shadow-blue-500/20"><i class="fas fa-shield-alt text-white text-sm"></i></div>
            <span class="font-bold text-sm tracking-tight dark:text-white">CyberLearn</span>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="toggleDarkMode()" class="p-2 rounded-lg text-slate-400 hover:text-blue-500 transition-all">
                <i class="fas fa-moon dark:hidden text-xs"></i>
                <i class="fas fa-sun hidden dark:block text-xs"></i>
            </button>
            <div class="h-6 w-px bg-slate-200 dark:bg-slate-800"></div>
            <a href="professor.html" class="text-xs font-bold text-blue-600 hover:underline"><i class="fas fa-arrow-left mr-1"></i> Voltar</a>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-5xl mx-auto w-full overflow-hidden flex flex-col">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-xl font-black dark:text-white">Alunos Registados</h2>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Gestão de Utilizadores</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="gerarRelatorioGeral()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 shadow-lg shadow-red-500/20 transition-all">
                    <i class="fas fa-file-pdf"></i> Extrair PDF
                </button>
                <div class="bg-blue-50 dark:bg-blue-900/20 px-4 py-2 rounded-xl border border-blue-100 dark:border-blue-800">
                    <span class="text-[10px] font-bold text-blue-600 block uppercase">Total Alunos</span>
                    <span id="total-alunos" class="text-xl font-black dark:text-white">0</span>
                </div>
            </div>
        </header>

        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden flex-1 flex flex-col">
            <div class="overflow-y-auto custom-scroll">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 dark:bg-slate-800/50 sticky top-0">
                        <tr>
                            <th class="p-4 text-[10px] font-black uppercase text-slate-400 tracking-widest">Nome</th>
                            <th class="p-4 text-[10px] font-black uppercase text-slate-400 tracking-widest">Email</th>
                            <th class="p-4 text-[10px] font-black uppercase text-slate-400 tracking-widest">Perfil</th>
                            <th class="p-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo"></tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
