<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLearn - Quiz Phishing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        * { transition: all 0.3s ease; }
        .option-btn:hover { transform: translateX(8px); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans antialiased text-gray-800 dark:text-gray-100">

    <nav class="p-6 flex justify-between items-center max-w-4xl mx-auto">
        <a href="dashboard.html" class="text-cyan-500 hover:text-cyan-400 font-bold flex items-center gap-2">
            <i class="fas fa-arrow-left text-sm"></i> Sair do Quiz
        </a>
        <div class="flex items-center gap-2">
            <span id="progress-text" class="text-sm font-bold text-gray-400 uppercase tracking-widest">Pergunta 1 de 5</span>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div class="w-full bg-gray-200 dark:bg-gray-800 h-2 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="bg-cyan-500 h-full w-1/5 transition-all duration-500"></div>
        </div>

        <div id="quiz-container" class="bg-white dark:bg-gray-800 p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-gray-100 dark:border-gray-700">
            
            <div id="question-area">
                <div class="bg-blue-600/10 text-blue-600 dark:text-blue-400 w-fit px-4 py-1 rounded-full text-xs font-black uppercase mb-6 tracking-widest">
                    Segurança Digital
                </div>
                <h2 id="question-text" class="text-2xl md:text-3xl font-black mb-10 leading-tight">
                    A carregar pergunta...
                </h2>

                <div id="options-container" class="space-y-4">
                    </div>
            </div>

            <div id="result-area" class="hidden text-center py-10">
                <div class="text-6xl mb-6">🏆</div>
                <h2 class="text-4xl font-black mb-4">Quiz Terminado!</h2>
                <p class="text-xl text-gray-500 dark:text-gray-400 mb-8">Conseguiste acertar <span id="final-score" class="text-cyan-500 font-bold">0</span> de 5 perguntas.</p>
                <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">
                    Tentar Novamente
                </button>
            </div>
        </div>
    </main>

    <script>
        const questions = [
            {
                q: "O que define um ataque de 'Phishing'?",
                options: [
                    "Um vírus que apaga ficheiros do sistema.",
                    "Emails falsos para roubar dados sensíveis.",
                    "Um programa que acelera a internet.",
                    "Um ataque físico ao servidor."
                ],
                correct: 1
            },
            {
                q: "Qual destes é um sinal comum de Phishing?",
                options: [
                    "Linguagem profissional e sem erros.",
                    "Links que levam ao site oficial.",
                    "Sentido de urgência e ameaças de bloqueio.",
                    "O uso do teu nome completo correto."
                ],
                correct: 2
            },
            {
                q: "O que deves fazer antes de clicar num link num email?",
                options: [
                    "Clicar rapidamente para ver se funciona.",
                    "Passar o rato por cima para ver o URL real.",
                    "Responder ao email a perguntar se é seguro.",
                    "Reencaminhar para todos os amigos."
                ],
                correct: 1
            },
            {
                q: "O que é 'Spear Phishing'?",
                options: [
                    "Um ataque disparado para milhões de pessoas.",
                    "Um ataque direcionado a uma pessoa específica.",
                    "Um tipo de hardware de rede.",
                    "Uma técnica de proteção de passwords."
                ],
                correct: 1
            },
            {
                q: "Qual a melhor defesa contra Phishing?",
                options: [
                    "Não usar email de todo.",
                    "Instalar apenas um antivírus grátis.",
                    "Usar MFA (Autenticação Multi-fator).",
                    "Escrever as passwords num papel."
                ],
                correct: 2
            }
        ];

        let currentIndex = 0;
        let score = 0;

        function loadQuestion() {
            const q = questions[currentIndex];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-text').innerText = `Pergunta ${currentIndex + 1} de ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 rounded-2xl bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 font-medium hover:border-cyan-500 dark:hover:border-cyan-500 hover:bg-cyan-500/5 transition-all flex justify-between items-center group";
                btn.innerHTML = `<span>${opt}</span> <i class="fas fa-chevron-right text-gray-300 group-hover:text-cyan-500 transition"></i>`;
                btn.onclick = () => checkAnswer(index);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if (selected === questions[currentIndex].correct) {
                score++;
            }

            currentIndex++;

            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            // Guardar pontos no localStorage para o Dashboard usar
            const totalPoints = score * 10;
            localStorage.setItem('userPoints', totalPoints);
        }

        loadQuestion();
    </script>
</body>
</html>
