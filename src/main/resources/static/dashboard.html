<!DOCTYPE html>
<html lang="pt" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLearn - Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // Inicialização do tema
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        }

        function executarLogout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>

    <style>
        * { transition: background-color 0.2s ease, color 0.2s ease; }
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-200 font-sans antialiased">

    <nav class="h-12 bg-white dark:bg-slate-900 shadow-sm px-6 flex justify-between items-center z-50 border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded shadow-lg shadow-blue-500/20">
                <i class="fas fa-shield-alt text-white text-sm"></i>
            </div>
            <span class="font-bold text-sm tracking-tight dark:text-white">CyberLearn</span>
        </div>
        
        <div class="flex items-center gap-4 text-xs font-semibold">
            <div class="flex items-center gap-1.5 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-md border border-slate-200 dark:border-slate-700">
                <i class="fas fa-coins text-blue-500"></i>
                <span id="nav-points">0</span> <span class="text-slate-400 font-normal">XP</span>
            </div>

            <div class="h-6 w-px bg-slate-200 dark:bg-slate-800"></div>

            <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-yellow-400 hover:ring-2 hover:ring-blue-500 transition-all">
                <i class="fas fa-moon block dark:hidden text-xs"></i>
                <i class="fas fa-sun hidden dark:block text-xs"></i>
            </button>

            <button onclick="executarLogout()" class="text-slate-400 hover:text-red-500 transition-colors">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <main class="flex-1 grid grid-cols-12 gap-4 p-4 overflow-hidden">
        
        <aside class="col-span-3 flex flex-col gap-4">
            <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 dark:bg-blue-900/30 rounded-lg flex items-center justify-center">
                        <i class="fas fa-user text-blue-600 dark:text-blue-400"></i>
                    </div>
                    <div class="overflow-hidden">
                        <h2 id="welcome-text" class="font-bold text-sm truncate dark:text-white">Explorador</h2>
                        <p id="perfil-text" class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Aluno • Nível 1</p>
                    </div>
                </div>
                <a href="perfil.html" class="mt-4 block text-center py-2 bg-slate-50 dark:bg-slate-800 hover:bg-blue-600 hover:text-white rounded-lg text-[10px] font-bold transition-all">
                    VER PERFIL COMPLETO
                </a>
            </div>

            <div class="flex-1 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col overflow-hidden">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Conquistas</h3>
                <div class="flex-1 overflow-y-auto custom-scroll space-y-2">
                    <div id="ach-1" class="flex items-center gap-3 p-2 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-100 dark:border-slate-700 opacity-40 transition-opacity">
                        <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center text-[10px]"><i class="fas fa-flag"></i></div>
                        <span class="text-[10px] font-bold">Iniciante Cyber</span>
                    </div>
                    <div id="ach-2" class="flex items-center gap-3 p-2 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-100 dark:border-slate-700 opacity-40 transition-opacity">
                        <div class="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center text-[10px]"><i class="fas fa-check"></i></div>
                        <span class="text-[10px] font-bold">Mestre de Quiz</span>
                    </div>
                </div>
            </div>
        </aside>

        <div class="col-span-9 grid grid-rows-5 gap-4">
            
            <div class="row-span-2 bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm grid grid-cols-2 gap-8">
                
                <div class="flex flex-col justify-center">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fas fa-book-reader text-blue-500 text-xs"></i>
                        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Módulos Lidos</h3>
                    </div>
                    <div class="flex items-end justify-between mb-2">
                        <span id="module-percent" class="text-3xl font-black dark:text-white">0%</span>
                        <span id="module-count" class="text-[10px] font-bold text-blue-500 uppercase">0/8</span>
                    </div>
                    <div class="w-full bg-slate-100 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden">
                        <div id="module-bar" class="bg-blue-600 h-full w-0 transition-all duration-1000"></div>
                    </div>
                </div>

                <div class="flex flex-col justify-center border-l border-slate-100 dark:border-slate-800 pl-8">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fas fa-tasks text-emerald-500 text-xs"></i>
                        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Quizzes Concluídos</h3>
                    </div>
                    <div class="flex items-end justify-between mb-2">
                        <span id="quiz-percent" class="text-3xl font-black dark:text-white">0%</span>
                        <span id="quiz-count" class="text-[10px] font-bold text-emerald-500 uppercase">0/4</span>
                    </div>
                    <div class="w-full bg-slate-100 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden">
                        <div id="quiz-bar" class="bg-emerald-500 h-full w-0 transition-all duration-1000"></div>
                    </div>
                </div>
            </div>

            <div class="row-span-3 grid grid-cols-2 gap-4">
                <a href="modulos.html" class="group bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:border-blue-500 transition-all flex flex-col justify-between">
                    <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/20 rounded-lg flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all">
                        <i class="fas fa-graduation-cap text-lg"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-bold dark:text-white leading-tight">Módulos de Estudo</h4>
                        <p class="text-xs text-slate-400 mt-1">Explora a biblioteca e aprende a proteger-te.</p>
                    </div>
                </a>

                <a href="quiz.html" class="group bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:border-emerald-500 transition-all flex flex-col justify-between">
                    <div class="w-10 h-10 bg-emerald-50 dark:bg-emerald-900/20 rounded-lg flex items-center justify-center text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-all">
                        <i class="fas fa-vial text-lg"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-bold dark:text-white leading-tight">Desafios de Conhecimento</h4>
                        <p class="text-xs text-slate-400 mt-1">Ganha XP e medalhas completando quizzes.</p>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script>
        function atualizarInterface() {
            // 1. Dados Básicos
            const pontos = parseInt(localStorage.getItem('userPoints')) || 0;
            const nome = localStorage.getItem('userName') || "Explorador";
            const perfil = localStorage.getItem('userPerfil') || "Aluno";

            document.getElementById('welcome-text').innerText = nome;
            document.getElementById('perfil-text').innerText = `${perfil} • Nível 1`;
            document.getElementById('nav-points').innerText = pontos;

            // 2. Lógica de Módulos (Exemplo: 8 totais)
            // Aqui podes criar uma chave 'modulesDone' no localStorage futuramente
            const modulosLidos = parseInt(localStorage.getItem('modulesDone')) || 0;
            const totalModulos = 8;
            const modPercent = Math.floor((modulosLidos / totalModulos) * 100);
            
            document.getElementById('module-percent').innerText = `${modPercent}%`;
            document.getElementById('module-count').innerText = `${modulosLidos}/${totalModulos}`;
            document.getElementById('module-bar').style.width = `${modPercent}%`;

            // 3. Lógica de Quizzes (Exemplo: 4 totais)
            // Aqui podes criar uma chave 'quizzesDone' no localStorage futuramente
            const quizzesFeitos = parseInt(localStorage.getItem('quizzesDone')) || 0;
            const totalQuizzes = 4;
            const quizPercent = Math.floor((quizzesFeitos / totalQuizzes) * 100);

            document.getElementById('quiz-percent').innerText = `${quizPercent}%`;
            document.getElementById('quiz-count').innerText = `${quizzesFeitos}/${totalQuizzes}`;
            document.getElementById('quiz-bar').style.width = `${quizPercent}%`;

            // 4. Desbloqueio Visual de Conquistas
            if (modulosLidos > 0) document.getElementById('ach-1').classList.remove('opacity-40');
            if (quizzesFeitos > 0) document.getElementById('ach-2').classList.remove('opacity-40');
        }

        window.onload = atualizarInterface;
    </script>
</body>
</html>
