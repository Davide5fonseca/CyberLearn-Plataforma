<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>CyberLearn - Criar Conta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div class="card">
        <h2>Criar Conta</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Palavra-passe">
        <select id="perfil">
            <option value="Aluno">Aluno</option>
            <option value="Professor">Professor</option>
        </select>
        <button onclick="executarRegisto()">Finalizar Registo</button>
        <p><a href="index.html">Já tenho conta (Voltar)</a></p>
    </div>

    <script>
        async function executarRegisto() {
            const dados = { nome: nome.value, email: email.value, passwordHash: pass.value, perfil: perfil.value };
            const res = await fetch('/api/usuarios/registo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (res.ok) {
                alert("Conta criada! Faz o teu login.");
                window.location.href = "index.html"; // VOLTA PARA O LOGIN
            } else {
                alert("Erro ao criar conta.");
            }
        }
    </script>
</body>
</html>
