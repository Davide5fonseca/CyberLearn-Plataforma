<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLearn - Criar Conta</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        * { transition: background-color 0.3s ease, color 0.3s ease; }
        /* Estilo para o dropdown no dark mode */
        select option { background: white; color: black; }
        .dark select option { background: #374151; color: white; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 h-screen flex items-center justify-center font-sans antialiased">

    <div class="bg-white dark:bg-gray-800 p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-gray-100 dark:border-gray-700 mx-4">
        
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-blue-500/30">
                <i class="fas fa-user-plus text-2xl"></i>
            </div>
            <h2 class="text-3xl font-black text-gray-800 dark:text-white tracking-tight">Criar Conta</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-2">Junta-te à comunidade CyberLearn</p>
        </div>

        <div class="space-y-4">
            <div>
                <input type="text" id="nome" placeholder="Nome Completo" 
                    class="w-full px-5 py-4 rounded-2xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>

            <div>
                <input type="email" id="email" placeholder="E-mail" 
                    class="w-full px-5 py-4 rounded-2xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>
            
            <div>
                <input type="password" id="pass" placeholder="Palavra-passe" 
                    class="w-full px-5 py-4 rounded-2xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>

            <div>
                <select id="perfil" 
                    class="w-full px-5 py-4 rounded-2xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white cursor-pointer appearance-none">
                    <option value="ALUNO">Aluno</option>
                    <option value="PROFESSOR">Professor</option>
                    <option value="ADMINISTRADOR">Administrador</option>
                </select>
            </div>

            <button onclick="executarRegisto()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/25 transform active:scale-[0.98] transition-all text-lg mt-2">
                Finalizar Registo
            </button>
        </div>

        <p class="text-center mt-8 text-gray-600 dark:text-gray-400 font-medium">
            <a href="index.html" class="text-cyan-500 hover:text-cyan-400 underline decoration-dotted underline-offset-4 transition-colors">
                <i class="fas fa-arrow-left text-xs mr-1"></i> Já tenho conta (Voltar)
            </a>
        </p>
    </div>

    <script>
        async function executarRegisto() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('pass').value;
            const perfil = document.getElementById('perfil').value;

            if(!nome || !email || !senha) {
                alert("Por favor, preenche todos os campos.");
                return;
            }

            const res = await fetch('/api/usuarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    nome: nome, 
                    email: email, 
                    passwordHash: senha,
                    perfil: perfil
                })
            });

            if (res.ok) {
                alert("Conta criada com sucesso!");
                window.location.href = "index.html";
            } else {
                alert("Erro ao criar conta. Tenta novamente.");
            }
        }
    </script>
</body>
</html>
