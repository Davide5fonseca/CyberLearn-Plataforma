<!DOCTYPE html>
<html lang="pt" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLearn - Login</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // Lógica de Inicialização do Tema
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        }
    </script>

    <style>
        * { transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-200 font-sans antialiased">

    <div class="fixed top-6 right-6 z-50">
        <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 text-slate-500 dark:text-yellow-400 hover:scale-110 transition-all">
            <i class="fas fa-moon dark:hidden"></i>
            <i class="fas fa-sun hidden dark:block"></i>
        </button>
    </div>

    <main class="flex-1 flex items-center justify-center p-6">
        
        <div class="w-full max-w-[400px] flex flex-col gap-8">
            
            <div class="text-center">
                <div class="inline-flex items-center justify-center bg-blue-600 w-14 h-14 rounded-2xl shadow-xl shadow-blue-500/20 mb-4">
                    <i class="fas fa-shield-alt text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tight dark:text-white">CyberLearn</h1>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-1 uppercase font-bold tracking-widest">Plataforma de Cibersegurança</p>
            </div>

            <section class="bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none">
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-1.5 ml-1">Endereço de Email</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                            <input type="email" id="email" required
                                class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-xl py-3 pl-11 pr-4 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all dark:text-white"
                                placeholder="exemplo@email.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-1.5 ml-1">Palavra-passe</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                            <input type="password" id="password" required
                                class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-xl py-3 pl-11 pr-4 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all dark:text-white"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                            <span>Entrar na Plataforma</span>
                            <i class="fas fa-sign-in-alt text-xs opacity-70"></i>
                        </button>
                    </div>
                </form>
            </section>

            <div class="text-center">
                <p class="text-xs text-slate-500 dark:text-slate-400">
                    Ainda não tens conta? 
                    <a href="registo.html" class="text-blue-600 dark:text-blue-400 font-bold hover:underline">Regista-te aqui</a>
                </p>
            </div>

        </div>
    </main>

    <footer class="h-12 flex items-center justify-center border-t border-slate-200 dark:border-slate-800">
        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400">&copy; 2026 CyberLearn • Davide Fonseca</p>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            // Simulação de login para manter os dados no Dashboard
            // No futuro, aqui farás o fetch para o teu backend Java
            const nomeSimulado = email.split('@')[0];
            localStorage.setItem('userName', nomeSimulado.charAt(0).toUpperCase() + nomeSimulado.slice(1));
            localStorage.setItem('userPoints', '0');
            localStorage.setItem('userPerfil', 'ALUNO');
            
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
