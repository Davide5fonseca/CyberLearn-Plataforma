<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLearn - Login</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        * { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 h-screen flex items-center justify-center font-sans antialiased">

    <div class="bg-white dark:bg-gray-800 p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-gray-100 dark:border-gray-700 mx-4">
        
        <div class="text-center mb-10">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-blue-500/30">
                <i class="fas fa-shield-alt text-3xl"></i>
            </div>
            <h2 class="text-3xl font-black text-gray-800 dark:text-white tracking-tight">CyberLearn</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-2">Plataforma de Aprendizagem</p>
        </div>

        <div class="space-y-5">
            <div>
                <input type="email" id="email" placeholder="E-mail" 
                    class="w-full px-5 py-4 rounded-2xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>
            
            <div>
                <input type="password" id="pass" placeholder="Palavra-passe" 
                    class="w-full px-5 py-4 rounded-2xl bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white placeholder-gray-400">
            </div>

            <button onclick="executarLogin()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/25 transform active:scale-[0.98] transition-all text-lg">
                Entrar
            </button>
        </div>

        <p class="text-center mt-8 text-gray-600 dark:text-gray-400 font-medium">
            Ainda não tens conta? 
            <a href="registo.html" class="text-cyan-500 hover:text-cyan-400 underline decoration-dotted underline-offset-4 transition-colors">
                Regista-te aqui
            </a>
        </p>
    </div>

    <script>
        async function executarLogin() {
            const emailField = document.getElementById('email');
            const passField = document.getElementById('pass');

            const res = await fetch('/api/usuarios/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: emailField.value, 
                    passwordHash: passField.value 
                })
            });

            if (res.ok) {
                const user = await res.json();
                // Guardamos os dados na sessão do navegador
                localStorage.setItem('userName', user.nome);
                localStorage.setItem('userPerfil', user.perfil);
                
                // REDIRECIONAMENTO PARA O DASHBOARD
                window.location.href = "dashboard.html";
            } else {
                alert("Falha no login. Verifica as tuas credenciais.");
            }
        }
    </script>
</body>
</html>
