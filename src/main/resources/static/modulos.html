<!DOCTYPE html>
<html lang="pt" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLearn - Biblioteca</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // Mapeamento de Cores e Ícones por Categoria
        const configCategorias = {
            'REDES': { icon: 'fa-share-alt', color: 'pink' },
            'PHISHING': { icon: 'fa-fish', color: 'cyan' },
            'PASSWORDS': { icon: 'fa-key', color: 'blue' },
            'MALWARE': { icon: 'fa-virus-slash', color: 'red' },
            'WIFI': { icon: 'fa-wifi', color: 'amber' },
            'COMPRAS': { icon: 'fa-shopping-cart', color: 'emerald' },
            'SOCIAL': { icon: 'fa-user-ninja', color: 'orange' },
            'BULLYING': { icon: 'fa-comment-slash', color: 'purple' },
            'DEFAULT': { icon: 'fa-book', color: 'slate' }
        };

        async function carregarModulos() {
            try {
                const res = await fetch('/api/usuarios/lista-modulos');
                const modulos = await res.json();
                const grid = document.getElementById('grid-modulos');
                grid.innerHTML = '';

                modulos.forEach(m => {
                    const conf = configCategorias[m.categoria] || configCategorias['DEFAULT'];
                    
                    grid.innerHTML += `
                        <div onclick="abrirLeitura(${m.id})" 
                             class="group bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:border-${conf.color}-500 transition-all cursor-pointer flex items-center gap-4 active:scale-95">
                            <div class="w-10 h-10 bg-${conf.color}-50 dark:bg-${conf.color}-900/20 text-${conf.color}-600 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fas ${conf.icon}"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-sm dark:text-white leading-tight">${m.titulo}</h3>
                                <p class="text-[10px] text-slate-400 uppercase tracking-tighter">${m.categoria}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error("Erro:", err); }
        }

        function abrirLeitura(id) {
            localStorage.setItem('currentModuloId', id);
            window.location.href = 'leitura.html';
        }

        window.onload = carregarModulos;
    </script>

    <style>
        * { transition: background-color 0.2s ease, color 0.2s ease, transform 0.1s ease; }
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-200 font-sans antialiased">

    <nav class="h-12 bg-white dark:bg-slate-900 shadow-sm px-6 flex justify-between items-center z-50 border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded shadow-lg shadow-blue-500/20"><i class="fas fa-shield-alt text-white text-sm"></i></div>
            <span class="font-bold text-sm tracking-tight dark:text-white">CyberLearn</span>
        </div>
        <div class="flex items-center gap-4 text-xs font-semibold">
            <a href="dashboard.html" class="text-blue-600 hover:underline"><i class="fas fa-arrow-left mr-1"></i> Dashboard</a>
        </div>
    </nav>

    <main class="flex-1 p-6 flex flex-col overflow-hidden max-w-5xl mx-auto w-full">
        <header class="mb-6">
            <h2 class="text-xl font-black tracking-tight dark:text-white">Biblioteca Académica 📚</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Explora os conteúdos publicados pelo teu professor.</p>
        </header>

        <div id="grid-modulos" class="grid grid-cols-1 md:grid-cols-2 gap-3 overflow-y-auto custom-scroll pr-2 pb-10">
            </div>
    </main>

</body>
</html>
